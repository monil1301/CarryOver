name: Release (macOS app zip)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build (Release)
        run: |
          set -euo pipefail
          xcodebuild \
            -project CarryOver.xcodeproj \
            -scheme CarryOver \
            -configuration Release \
            -destination "platform=macOS" \
            -derivedDataPath build \
            -clonedSourcePackagesDirPath spm \
            clean build

      - name: Locate .app
        run: |
          set -euo pipefail
          APP_PATH="$(find build/Build/Products/Release -maxdepth 2 -name "CarryOver.app" -print -quit)"
          if [ -z "$APP_PATH" ]; then
            echo "CarryOver.app not found!"
            find build/Build/Products -maxdepth 4 -type d -name "*.app" -print
            exit 1
          fi
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV

      - name: Zip app
        run: |
          set -euo pipefail
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" CarryOver.app.zip
          shasum -a 256 CarryOver.app.zip > CarryOver.app.zip.sha256

      - name: Sign update with Sparkle
        if: startsWith(github.ref, 'refs/tags/')
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          SIGN_TOOL="spm/artifacts/sparkle/Sparkle/bin/sign_update"
          chmod +x "$SIGN_TOOL"
          KEY_FILE=$(mktemp)
          echo -n "$SPARKLE_PRIVATE_KEY" > "$KEY_FILE"
          SIGN_OUTPUT=$("$SIGN_TOOL" CarryOver.app.zip -f "$KEY_FILE" 2>&1) || true
          rm -f "$KEY_FILE"
          echo "sign_update output: $SIGN_OUTPUT"

          # Try sparkle:edSignature="..." format first
          if echo "$SIGN_OUTPUT" | grep -q 'sparkle:edSignature='; then
            SIGNATURE=$(echo "$SIGN_OUTPUT" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')
          else
            # Older versions output just the raw signature string
            SIGNATURE=$(echo "$SIGN_OUTPUT" | head -1)
          fi

          if [ -z "$SIGNATURE" ]; then
            echo "::error::Failed to extract signature from sign_update output"
            exit 1
          fi

          LENGTH=$(stat -f%z CarryOver.app.zip)
          echo "SPARKLE_SIGNATURE=$SIGNATURE" >> $GITHUB_ENV
          echo "SPARKLE_LENGTH=$LENGTH" >> $GITHUB_ENV

      - name: Update appcast.xml
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/CarryOver.app.zip"
          PUB_DATE=$(date -R)

          cat > appcast.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>CarryOver Updates</title>
              <link>https://monil1301.github.io/CarryOver/appcast.xml</link>
              <description>Updates for CarryOver</description>
              <language>en</language>
              <item>
                <title>Version ${VERSION}</title>
                <pubDate>${PUB_DATE}</pubDate>
                <sparkle:version>${VERSION}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <enclosure
                  url="${DOWNLOAD_URL}"
                  sparkle:edSignature="${SPARKLE_SIGNATURE}"
                  length="${SPARKLE_LENGTH}"
                  type="application/octet-stream"
                />
              </item>
            </channel>
          </rss>
          EOF

          # Push appcast.xml to gh-pages branch
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan gh-pages-tmp
          git rm -rf . > /dev/null 2>&1 || true
          mv appcast.xml .
          git add appcast.xml
          git commit -m "Update appcast for ${TAG}"
          git push origin gh-pages-tmp:gh-pages --force

      - name: Create GitHub Release and upload assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            CarryOver.app.zip
            CarryOver.app.zip.sha256
          generate_release_notes: true
