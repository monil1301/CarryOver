name: Build (macOS)

on:
  # Disabled: requires Xcode 26 / macOS 26 which is not yet available on GitHub-hosted runners
  # pull_request:
  # push:
  #   branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          set -euo pipefail
          xcodebuild -project CarryOver.xcodeproj \
            -scheme CarryOver \
            -configuration Release \
            -destination "platform=macOS" \
            build
