name: Build (macOS)

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          set -euo pipefail
          xcodebuild -project CarryOver.xcodeproj \
            -scheme CarryOver \
            -configuration Release \
            -destination "platform=macOS" \
            build
